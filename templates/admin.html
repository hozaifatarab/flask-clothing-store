<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - إدارة المنتجات</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f5f6fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .admin-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .admin-header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header h1 { font-size: 26px; }
        .admin-header .links { display: flex; gap: 15px; align-items: center; }
        .admin-header .links a {
            color: white; text-decoration: none; padding: 8px 16px;
            border-radius: 8px; background: rgba(255,255,255,0.15);
            font-size: 14px; transition: 0.3s;
        }
        .admin-header .links a:hover { background: rgba(255,255,255,0.3); }
        .admin-header .links .logout-btn { background: #e74c3c; }
        .admin-header .links .logout-btn:hover { background: #c0392b; }

        .admin-grid { display: grid; grid-template-columns: 420px 1fr; gap: 25px; }
        @media (max-width: 1000px) { .admin-grid { grid-template-columns: 1fr; } }

        .card {
            background: white; border-radius: 15px; padding: 25px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
        .card-title {
            font-size: 18px; font-weight: bold; margin-bottom: 20px;
            padding-bottom: 12px; border-bottom: 3px solid #3498db;
            display: flex; align-items: center; gap: 8px;
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; margin-bottom: 6px; font-weight: 600;
            color: #333; font-size: 14px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 14px; transition: 0.3s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: #3498db; outline: none; box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-group input[type="file"] { padding: 8px; }

        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            transition: 0.3s; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-primary:hover { background: #2980b9; transform: translateY(-1px); }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #229954; transform: translateY(-1px); }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-warning:hover { background: #d68910; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-block { width: 100%; justify-content: center; }

        .products-table { width: 100%; border-collapse: collapse; }
        .products-table th {
            background: #f8f9fa; padding: 12px 10px; text-align: center;
            font-size: 13px; color: #555; border-bottom: 2px solid #dee2e6;
        }
        .products-table td {
            padding: 12px 10px; text-align: center; font-size: 13px;
            border-bottom: 1px solid #eee; vertical-align: middle;
        }
        .products-table tr:hover { background: #f8f9fa; }
        .products-table .product-img {
            width: 50px; height: 50px; object-fit: cover; border-radius: 8px;
        }
        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: bold;
        }
        .status-available { background: #d4edda; color: #155724; }
        .status-unavailable { background: #f8d7da; color: #721c24; }
        .actions { display: flex; gap: 5px; justify-content: center; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: white; border-radius: 15px; padding: 30px;
            width: 550px; max-width: 90%; max-height: 90vh; overflow-y: auto;
        }
        .modal-box h2 { margin-bottom: 20px; font-size: 20px; }
        .modal-close {
            float: left; background: none; border: none; font-size: 24px;
            cursor: pointer; color: #999;
        }
        .modal-close:hover { color: #333; }

        .alert {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; border-radius: 10px; font-weight: bold;
            z-index: 9999; box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            animation: slideDown 0.3s ease;
        }
        .alert-success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .empty-state { text-align: center; padding: 40px; color: #999; }
        .empty-state .icon { font-size: 48px; margin-bottom: 10px; }
        
        .image-preview {
            width: 100px; height: 100px; object-fit: cover;
            border-radius: 8px; border: 2px dashed #ddd;
            margin-top: 8px; display: none;
        }
        .image-preview.show { display: block; }
        
        .category-badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 11px; font-weight: bold;
        }
        .cat-men { background: #cce5ff; color: #004085; }
        .cat-women { background: #f8d7da; color: #721c24; }
        .cat-shoes { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div>
                <h1>📊 لوحة التحكم - إدارة المنتجات</h1>
                <p style="opacity:0.8;margin-top:5px;">أضف، عدل، واحذف المنتجات بسهولة</p>
            </div>
            <div class="links">
                <a href="/">🏠 المتجر</a>
                <a href="/admin_settings" style="background:#28a745; color:white; padding:10px; border-radius:5px; text-decoration:none">⚙️ الاعدادات</a>
                <a href="/admin/logout" class="logout-btn">🚪 خروج</a>
            </div>
        </div>

        <div class="admin-grid">
            <!-- القسم الأيمن: إضافة منتج جديد -->
            <div class="card">
                <div class="card-title">➕ إضافة منتج جديد</div>
                <form id="addProductForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label>اسم المنتج *</label>
                        <input type="text" id="productName" placeholder="مثال: قميص رجالي أبيض" required>
                    </div>
                    <div class="form-group">
                        <label>الوصف</label>
                        <textarea id="productDesc" placeholder="وصف المنتج..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>السعر (ريال) *</label>
                        <input type="number" id="productPrice" placeholder="مثال: 150" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>الكمية</label>
                        <input type="number" id="productStock" placeholder="مثال: 10" value="1" min="0">
                    </div>
                    <div class="form-group">
                        <label>التصنيف</label>
                        <select id="productCategory">
                            <option value="رجالي">👔 رجالي</option>
                            <option value="نسائي">👗 نسائي</option>
                            <option value="احذية">👟 احذية</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>حالة التوفر</label>
                        <select id="productAvailable">
                            <option value="1">✅ متوفر</option>
                            <option value="0">❌ غير متوفر</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>صورة المنتج</label>
                        <input type="file" id="productImage" accept="image/*">
                        <img id="addImagePreview" class="image-preview">
                    </div>
                    <div class="form-group">
                        <label>أو رابط الصورة (اختياري)</label>
                        <input type="url" id="productImageUrl" placeholder="https://example.com/image.jpg">
                    </div>
                    <button type="submit" class="btn btn-success btn-block">💾 إضافة المنتج</button>
                </form>
            </div>

            <!-- القسم الأيسر: جدول المنتجات -->
            <div class="card">
                <div class="card-title">📋 جميع المنتجات</div>
                <div style="overflow-x:auto;">
                    <table class="products-table" id="productsTable">
                        <thead>
                            <tr>
                                <th>الصورة</th>
                                <th>الاسم</th>
                                <th>السعر</th>
                                <th>الكمية</th>
                                <th>التصنيف</th>
                                <th>الحالة</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="productsBody">
                            <tr><td colspan="7" style="text-align:center;padding:30px;color:#999;">جاري تحميل المنتجات...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة تعديل المنتج -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeEditModal()">&times;</button>
            <h2>✏️ تعديل المنتج</h2>
            <form id="editProductForm" enctype="multipart/form-data">
                <input type="hidden" id="editProductId">
                <div class="form-group">
                    <label>اسم المنتج *</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="editDesc"></textarea>
                </div>
                <div class="form-group">
                    <label>السعر (ريال) *</label>
                    <input type="number" id="editPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>الكمية</label>
                    <input type="number" id="editStock" min="0">
                </div>
                <div class="form-group">
                    <label>التصنيف</label>
                    <select id="editCategory">
                        <option value="رجالي">👔 رجالي</option>
                        <option value="نسائي">👗 نسائي</option>
                        <option value="احذية">👟 احذية</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>حالة التوفر</label>
                    <select id="editAvailable">
                        <option value="1">✅ متوفر</option>
                        <option value="0">❌ غير متوفر</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>صورة المنتج</label>
                    <input type="file" id="editImage" accept="image/*">
                    <img id="editImagePreview" class="image-preview">
                </div>
                <div class="form-group">
                    <label>أو رابط الصورة (اختياري)</label>
                    <input type="url" id="editImageUrl">
                </div>
                <button type="submit" class="btn btn-primary btn-block">💾 حفظ التعديلات</button>
            </form>
        </div>
    </div>

    <script>
        // ===== معاينة الصور =====
        document.getElementById('productImage').addEventListener('change', function(e) {
            const preview = document.getElementById('addImagePreview');
            if (e.target.files[0]) {
                preview.src = URL.createObjectURL(e.target.files[0]);
                preview.classList.add('show');
            }
        });
        
        document.getElementById('editImage').addEventListener('change', function(e) {
            const preview = document.getElementById('editImagePreview');
            if (e.target.files[0]) {
                preview.src = URL.createObjectURL(e.target.files[0]);
                preview.classList.add('show');
            }
        });

        // ===== تحميل المنتجات =====
        async function loadProducts() {
            try {
                const response = await fetch('/api/admin/products');
                const products = await response.json();
                displayProducts(products);
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsBody').innerHTML = 
                    '<tr><td colspan="7" style="text-align:center;padding:30px;color:red;">خطأ في تحميل المنتجات</td></tr>';
            }
        }

        function getCategoryBadge(category) {
            if (category === 'رجالي') return '<span class="category-badge cat-men">👔 رجالي</span>';
            if (category === 'نسائي') return '<span class="category-badge cat-women">👗 نسائي</span>';
            if (category === 'احذية') return '<span class="category-badge cat-shoes">👟 احذية</span>';
            return category;
        }

        function displayProducts(products) {
            const tbody = document.getElementById('productsBody');
            
            if (products.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="7">
                        <div class="empty-state">
                            <div class="icon">📭</div>
                            <p>لا توجد منتجات بعد</p>
                        </div>
                    </td></tr>
                `;
                return;
            }

            tbody.innerHTML = products.map(p => `
                <tr>
                    <td><img src="${p.image}" class="product-img" onerror="this.src='https://via.placeholder.com/50?text=?'"></td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.price} ريال</td>
                    <td>${p.stock}</td>
                    <td>${getCategoryBadge(p.category)}</td>
                    <td>
                        ${p.available == 1 
                            ? '<span class="status-badge status-available">✅ متوفر</span>' 
                            : '<span class="status-badge status-unavailable">❌ غير متوفر</span>'}
                    </td>
                    <td class="actions">
                        <button class="btn btn-warning btn-sm" onclick="openEditModal(${p.id})">✏️ تعديل</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑️ حذف</button>
                    </td>
                </tr>
            `).join('');
        }

        // ===== إضافة منتج =====
        document.getElementById('addProductForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('productName').value.trim();
            const price = parseFloat(document.getElementById('productPrice').value);
            const description = document.getElementById('productDesc').value.trim();
            const stock = parseInt(document.getElementById('productStock').value) || 0;
            const category = document.getElementById('productCategory').value;
            const available = parseInt(document.getElementById('productAvailable').value);
            const imageFile = document.getElementById('productImage').files[0];
            const imageUrl = document.getElementById('productImageUrl').value.trim();

            if (!name || !price) {
                showAlert('يرجى ملء اسم المنتج والسعر', 'error');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('name', name);
                formData.append('description', description);
                formData.append('price', price);
                formData.append('stock', stock);
                formData.append('category', category);
                formData.append('available', available);
                if (imageFile) {
                    formData.append('image', imageFile);
                }
                if (imageUrl) {
                    formData.append('image', imageUrl);
                }

                const response = await fetch('/api/admin/products', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    showAlert('✅ تم إضافة المنتج بنجاح', 'success');
                    document.getElementById('addProductForm').reset();
                    document.getElementById('addImagePreview').classList.remove('show');
                    loadProducts();
                } else {
                    const err = await response.json();
                    showAlert('❌ ' + (err.error || 'خطأ في إضافة المنتج'), 'error');
                }
            } catch (error) {
                console.error('Error adding product:', error);
                showAlert('❌ خطأ في الاتصال', 'error');
            }
        });

        // ===== تعديل منتج =====
        async function openEditModal(productId) {
            try {
                const response = await fetch(`/api/product/${productId}`);
                const product = await response.json();
                
                document.getElementById('editProductId').value = product.id;
                document.getElementById('editName').value = product.name;
                document.getElementById('editPrice').value = product.price;
                document.getElementById('editDesc').value = product.description || '';
                document.getElementById('editStock').value = product.stock || 0;
                document.getElementById('editCategory').value = product.category || 'رجالي';
                document.getElementById('editAvailable').value = product.available || 0;
                document.getElementById('editImageUrl').value = product.image || '';
                
                // معاينة الصورة الحالية
                const preview = document.getElementById('editImagePreview');
                if (product.image) {
                    preview.src = product.image;
                    preview.classList.add('show');
                } else {
                    preview.classList.remove('show');
                }
                
                document.getElementById('editModal').classList.add('active');
            } catch (error) {
                console.error('Error loading product for edit:', error);
                showAlert('❌ خطأ في تحميل بيانات المنتج', 'error');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        document.getElementById('editProductForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const id = document.getElementById('editProductId').value;
            const name = document.getElementById('editName').value.trim();
            const price = parseFloat(document.getElementById('editPrice').value);
            const description = document.getElementById('editDesc').value.trim();
            const stock = parseInt(document.getElementById('editStock').value) || 0;
            const category = document.getElementById('editCategory').value;
            const available = parseInt(document.getElementById('editAvailable').value);
            const imageFile = document.getElementById('editImage').files[0];
            const imageUrl = document.getElementById('editImageUrl').value.trim();

            if (!name || !price) {
                showAlert('يرجى ملء اسم المنتج والسعر', 'error');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('name', name);
                formData.append('description', description);
                formData.append('price', price);
                formData.append('stock', stock);
                formData.append('category', category);
                formData.append('available', available);
                if (imageFile) {
                    formData.append('image', imageFile);
                }
                if (imageUrl) {
                    formData.append('image', imageUrl);
                }

                const response = await fetch(`/api/admin/products/${id}`, {
                    method: 'PUT',
                    body: formData
                });

                if (response.ok) {
                    showAlert('✅ تم تعديل المنتج بنجاح', 'success');
                    closeEditModal();
                    loadProducts();
                } else {
                    const err = await response.json();
                    showAlert('❌ ' + (err.error || 'خطأ في تعديل المنتج'), 'error');
                }
            } catch (error) {
                console.error('Error updating product:', error);
                showAlert('❌ خطأ في الاتصال', 'error');
            }
        });

        // ===== حذف منتج =====
        async function deleteProduct(productId) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذا المنتج؟')) return;

            try {
                const response = await fetch(`/api/admin/products/${productId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showAlert('✅ تم حذف المنتج بنجاح', 'success');
                    loadProducts();
                } else {
                    showAlert('❌ خطأ في حذف المنتج', 'error');
                }
            } catch (error) {
                console.error('Error deleting product:', error);
                showAlert('❌ خطأ في الاتصال', 'error');
            }
        }

        // ===== التنبيهات =====
        function showAlert(message, type = 'success') {
            const existing = document.querySelector('.alert');
            if (existing) existing.remove();

            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            document.body.appendChild(alert);

            setTimeout(() => {
                alert.style.opacity = '0';
                alert.style.transition = '0.3s';
                setTimeout(() => alert.remove(), 300);
            }, 3000);
        }

        // ===== إغلاق المودال عند الضغط خارجها =====
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });

        // ===== تحميل عند فتح الصفحة =====
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            // تحديث تلقائي كل 5 ثوان
            setInterval(loadProducts, 5000);
        });
    </script>
</body>
</html>
