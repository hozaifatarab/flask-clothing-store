<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - FASHION HUB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0F0E17;
            color: #E0E0E0;
            min-height: 100vh;
        }
        .admin-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .admin-header {
            background: linear-gradient(135deg, #1A1932, #2A2955);
            border: 1px solid #2A2955;
            border-radius: 16px;
            padding: 24px 30px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header h1 { font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .admin-header .links { display: flex; gap: 10px; align-items: center; }
        .admin-header .links a {
            color: #E0E0E0; text-decoration: none; padding: 8px 16px;
            border-radius: 8px; background: rgba(255,255,255,0.08);
            font-size: 13px; font-weight: 600; transition: all 0.3s;
        }
        .admin-header .links a:hover { background: rgba(255,255,255,0.15); }
        .admin-header .links .logout { background: rgba(255,107,107,0.2); color: #FF6B6B; }
        .admin-header .links .logout:hover { background: rgba(255,107,107,0.3); }
        
        .admin-grid { display: grid; grid-template-columns: 400px 1fr; gap: 24px; }
        @media (max-width: 1000px) { .admin-grid { grid-template-columns: 1fr; } }
        
        .card {
            background: #1A1932;
            border: 1px solid #2A2955;
            border-radius: 16px;
            padding: 24px;
        }
        .card-title {
            font-size: 17px; font-weight: 700; margin-bottom: 20px;
            padding-bottom: 12px; border-bottom: 2px solid #6C5CE7;
            display: flex; align-items: center; gap: 8px;
        }
        
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; margin-bottom: 5px; font-weight: 600;
            color: #8888AA; font-size: 13px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 10px 14px;
            border: 1px solid #2A2955; border-radius: 8px;
            background: rgba(255,255,255,0.05); color: #E0E0E0;
            font-size: 14px; font-family: 'Tajawal', sans-serif;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none; border-color: #6C5CE7; box-shadow: 0 0 0 3px rgba(108,92,231,0.1);
        }
        .form-group textarea { min-height: 70px; resize: vertical; }
        .form-group input[type="file"] { padding: 8px; }
        
        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            transition: all 0.3s; font-family: 'Tajawal', sans-serif;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: #6C5CE7; color: white; }
        .btn-primary:hover { background: #5A4BD1; transform: translateY(-1px); }
        .btn-success { background: #00B894; color: white; }
        .btn-success:hover { background: #00A381; transform: translateY(-1px); }
        .btn-danger { background: #FF6B6B; color: white; }
        .btn-danger:hover { background: #E05555; }
        .btn-warning { background: #FDCB6E; color: #333; }
        .btn-warning:hover { background: #E0B050; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-block { width: 100%; justify-content: center; }
        
        .table-wrap { overflow-x: auto; }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th {
            padding: 12px 10px; text-align: center; font-size: 13px;
            color: #8888AA; border-bottom: 2px solid #2A2955;
            font-weight: 600;
        }
        .admin-table td {
            padding: 12px 10px; text-align: center; font-size: 13px;
            border-bottom: 1px solid rgba(42,41,85,0.5);
            vertical-align: middle;
        }
        .admin-table tr:hover td { background: rgba(108,92,231,0.05); }
        .admin-table .prod-img {
            width: 45px; height: 45px; object-fit: cover;
            border-radius: 8px;
        }
        .status-badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 700;
        }
        .status-ok { background: rgba(0,184,148,0.15); color: #00B894; }
        .status-no { background: rgba(255,107,107,0.15); color: #FF6B6B; }
        .actions { display: flex; gap: 4px; justify-content: center; }
        
        .cat-badge {
            display: inline-block; padding: 2px 8px; border-radius: 6px;
            font-size: 11px; font-weight: 700;
        }
        .cat-men { background: rgba(108,92,231,0.15); color: #6C5CE7; }
        .cat-women { background: rgba(253,121,168,0.15); color: #FD79A8; }
        .cat-shoes { background: rgba(0,206,201,0.15); color: #00CEC9; }
        .cat-acc { background: rgba(253,203,110,0.15); color: #FDCB6E; }
        
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #1A1932; border: 1px solid #2A2955;
            border-radius: 16px; padding: 30px;
            width: 550px; max-width: 92%; max-height: 90vh; overflow-y: auto;
        }
        .modal-box h2 { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .modal-close {
            float: left; background: none; border: none;
            font-size: 24px; cursor: pointer; color: #8888AA;
        }
        .modal-close:hover { color: #FF6B6B; }
        
        .img-preview {
            width: 80px; height: 80px; object-fit: cover;
            border-radius: 8px; border: 2px dashed #2A2955;
            margin-top: 6px; display: none;
        }
        .img-preview.show { display: block; }
        
        .alert {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 10px; font-weight: 700;
            z-index: 9999; box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            animation: alertIn 0.3s ease; font-size: 14px;
        }
        .alert-success { background: #00B894; color: white; }
        .alert-error { background: #FF6B6B; color: white; }
        @keyframes alertIn {
            from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        
        .empty-state { text-align: center; padding: 40px; color: #8888AA; }
        .empty-state .icon { font-size: 48px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div>
                <h1>📊 لوحة التحكم</h1>
                <p style="opacity:0.6;font-size:13px;margin-top:4px;">إدارة المنتجات والطلبات</p>
            </div>
            <div class="links">
                <a href="/">🏠 المتجر</a>
                <a href="/admin_settings">⚙️ الإعدادات</a>
                <a href="/admin/logout" class="logout">🚪 خروج</a>
            </div>
        </div>
        
        <div class="admin-grid">
            <!-- إضافة منتج -->
            <div class="card">
                <div class="card-title">➕ إضافة منتج</div>
                <form id="addForm" enctype="multipart/form-data">
                    <div class="form-group">
                        <label>اسم المنتج *</label>
                        <input type="text" id="pName" placeholder="مثال: قميص رجالي" required>
                    </div>
                    <div class="form-group">
                        <label>الوصف</label>
                        <textarea id="pDesc" placeholder="وصف المنتج..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>السعر (ريال) *</label>
                        <input type="number" id="pPrice" placeholder="150" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>الكمية</label>
                        <input type="number" id="pStock" value="1" min="0">
                    </div>
                    <div class="form-group">
                        <label>التصنيف</label>
                        <select id="pCat">
                            <option value="رجالي">👔 رجالي</option>
                            <option value="نسائي">👗 نسائي</option>
                            <option value="احذية">👟 أحذية</option>
                            <option value="اكسسوارات">⌚ اكسسوارات</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>صورة</label>
                        <input type="file" id="pImage" accept="image/*">
                        <img id="addPreview" class="img-preview">
                    </div>
                    <div class="form-group">
                        <label>أو رابط صورة</label>
                        <input type="url" id="pImageUrl" placeholder="https://...">
                    </div>
                    <button type="submit" class="btn btn-success btn-block">💾 إضافة</button>
                </form>
            </div>
            
            <!-- جدول المنتجات -->
            <div class="card">
                <div class="card-title">📋 المنتجات</div>
                <div class="table-wrap">
                    <table class="admin-table" id="productsTable">
                        <thead>
                            <tr>
                                <th>الصورة</th>
                                <th>الاسم</th>
                                <th>السعر</th>
                                <th>الكمية</th>
                                <th>التصنيف</th>
                                <th>الحالة</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="productsBody">
                            <tr><td colspan="7" style="text-align:center;padding:30px;color:#8888AA;">جاري التحميل...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- مودال التعديل -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeEdit()">&times;</button>
            <h2>✏️ تعديل المنتج</h2>
            <form id="editForm" enctype="multipart/form-data">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>اسم المنتج *</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>الوصف</label>
                    <textarea id="editDesc"></textarea>
                </div>
                <div class="form-group">
                    <label>السعر *</label>
                    <input type="number" id="editPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>الكمية</label>
                    <input type="number" id="editStock" min="0">
                </div>
                <div class="form-group">
                    <label>التصنيف</label>
                    <select id="editCat">
                        <option value="رجالي">👔 رجالي</option>
                        <option value="نسائي">👗 نسائي</option>
                        <option value="احذية">👟 أحذية</option>
                        <option value="اكسسوارات">⌚ اكسسوارات</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>صورة</label>
                    <input type="file" id="editImage" accept="image/*">
                    <img id="editPreview" class="img-preview">
                </div>
                <div class="form-group">
                    <label>أو رابط صورة</label>
                    <input type="url" id="editImageUrl">
                </div>
                <button type="submit" class="btn btn-primary btn-block">💾 حفظ</button>
            </form>
        </div>
    </div>
    
    <script>
        // معاينة الصور
        document.getElementById('pImage').addEventListener('change', function(e) {
            const p = document.getElementById('addPreview');
            if (e.target.files[0]) { p.src = URL.createObjectURL(e.target.files[0]); p.classList.add('show'); }
        });
        document.getElementById('editImage').addEventListener('change', function(e) {
            const p = document.getElementById('editPreview');
            if (e.target.files[0]) { p.src = URL.createObjectURL(e.target.files[0]); p.classList.add('show'); }
        });
        
        async function loadProducts() {
            try {
                const res = await fetch('/api/admin/products');
                const products = await res.json();
                displayProducts(products);
            } catch(e) {
                document.getElementById('productsBody').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:#FF6B6B;">خطأ في التحميل</td></tr>';
            }
        }
        
        function catBadge(cat) {
            const m = { 'رجالي': 'cat-men', 'نسائي': 'cat-women', 'احذية': 'cat-shoes', 'اكسسوارات': 'cat-acc' };
            return `<span class="cat-badge ${m[cat] || ''}">${cat}</span>`;
        }
        
        function displayProducts(products) {
            const tbody = document.getElementById('productsBody');
            if (!products.length) {
                tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="icon">📭</div><p>لا توجد منتجات</p></div></td></tr>';
                return;
            }
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td><img src="${p.image}" class="prod-img" onerror="this.src='https://via.placeholder.com/45?text=?'"></td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.price} ريال</td>
                    <td>${p.stock}</td>
                    <td>${catBadge(p.category)}</td>
                    <td><span class="status-badge ${p.available == 1 ? 'status-ok' : 'status-no'}">${p.available == 1 ? '✅ متوفر' : '❌ غير متوفر'}</span></td>
                    <td class="actions">
                        <button class="btn btn-warning btn-sm" onclick="openEdit(${p.id})">✏️</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }
        
        // إضافة
        document.getElementById('addForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('pName').value.trim();
            const price = parseFloat(document.getElementById('pPrice').value);
            if (!name || !price) { showAlert('املأ الاسم والسعر', 'error'); return; }
            
            const fd = new FormData();
            fd.append('name', name);
            fd.append('description', document.getElementById('pDesc').value.trim());
            fd.append('price', price);
            fd.append('stock', parseInt(document.getElementById('pStock').value) || 0);
            fd.append('category', document.getElementById('pCat').value);
            const file = document.getElementById('pImage').files[0];
            if (file) fd.append('image', file);
            const url = document.getElementById('pImageUrl').value.trim();
            if (url) fd.append('image', url);
            
            try {
                const res = await fetch('/api/admin/products', { method: 'POST', body: fd });
                if (res.ok) {
                    showAlert('✅ تمت الإضافة', 'success');
                    this.reset();
                    document.getElementById('addPreview').classList.remove('show');
                    loadProducts();
                } else {
                    const err = await res.json();
                    showAlert('❌ ' + (err.error || 'خطأ'), 'error');
                }
            } catch(e) { showAlert('❌ خطأ', 'error'); }
        });
        
        // تعديل
        async function openEdit(id) {
            try {
                const res = await fetch(`/api/product/${id}`);
                const p = await res.json();
                document.getElementById('editId').value = p.id;
                document.getElementById('editName').value = p.name;
                document.getElementById('editPrice').value = p.price;
                document.getElementById('editDesc').value = p.description || '';
                document.getElementById('editStock').value = p.stock || 0;
                document.getElementById('editCat').value = p.category || 'رجالي';
                document.getElementById('editImageUrl').value = p.image || '';
                const preview = document.getElementById('editPreview');
                if (p.image) { preview.src = p.image; preview.classList.add('show'); }
                else { preview.classList.remove('show'); }
                document.getElementById('editModal').classList.add('active');
            } catch(e) { showAlert('❌ خطأ', 'error'); }
        }
        
        function closeEdit() { document.getElementById('editModal').classList.remove('active'); }
        
        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value.trim();
            const price = parseFloat(document.getElementById('editPrice').value);
            if (!name || !price) { showAlert('املأ الاسم والسعر', 'error'); return; }
            
            const fd = new FormData();
            fd.append('name', name);
            fd.append('description', document.getElementById('editDesc').value.trim());
            fd.append('price', price);
            fd.append('stock', parseInt(document.getElementById('editStock').value) || 0);
            fd.append('category', document.getElementById('editCat').value);
            const file = document.getElementById('editImage').files[0];
            if (file) fd.append('image', file);
            const url = document.getElementById('editImageUrl').value.trim();
            if (url) fd.append('image', url);
            
            try {
                const res = await fetch(`/api/admin/products/${id}`, { method: 'PUT', body: fd });
                if (res.ok) {
                    showAlert('✅ تم التعديل', 'success');
                    closeEdit();
                    loadProducts();
                } else {
                    const err = await res.json();
                    showAlert('❌ ' + (err.error || 'خطأ'), 'error');
                }
            } catch(e) { showAlert('❌ خطأ', 'error'); }
        });
        
        // حذف
        async function deleteProduct(id) {
            if (!confirm('⚠️ متأكد من الحذف؟')) return;
            try {
                const res = await fetch(`/api/admin/products/${id}`, { method: 'DELETE' });
                if (res.ok) { showAlert('✅ تم الحذف', 'success'); loadProducts(); }
                else { showAlert('❌ خطأ', 'error'); }
            } catch(e) { showAlert('❌ خطأ', 'error'); }
        }
        
        function showAlert(msg, type) {
            const existing = document.querySelector('.alert');
            if (existing) existing.remove();
            const a = document.createElement('div');
            a.className = `alert alert-${type}`;
            a.textContent = msg;
            document.body.appendChild(a);
            setTimeout(() => { a.style.opacity = '0'; a.style.transition = '0.3s'; setTimeout(() => a.remove(), 300); }, 3000);
        }
        
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeEdit();
        });
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            setInterval(loadProducts, 5000);
        });
    </script>
</body>
</html>
