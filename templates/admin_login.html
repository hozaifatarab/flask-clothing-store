<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <title>تسجيل دخول الإدارة</title>
    <style>
        body {font-family: Arial; background: #f5f5f5; text-align: center; padding-top: 100px;}
       .login-box {background: white; width: 300px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px #ccc;}
        input {width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;}
        button {width: 95%; padding: 10px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer;}
    </style>
</head>
<body>
    <div class="login-box">
        <h2>تسجيل دخول الإدارة</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <p style="color:red;">{{ messages[0] }}</p>
          {% endif %}
        {% endwith %}
        <form method="post">
            <input type="password" name="password" placeholder="كلمة السر" required>
            <button type="submit">دخول</button>
        </form>
    </div>
</body>
</html>
