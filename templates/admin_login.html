<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة التحكم</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0F0E17, #1A1932);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #1A1932;
            border: 1px solid #2A2955;
            border-radius: 20px;
            padding: 40px;
            width: 380px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-logo {
            text-align: center;
            font-size: 48px;
            margin-bottom: 10px;
        }
        .login-title {
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            color: #E0E0E0;
            margin-bottom: 6px;
        }
        .login-sub {
            text-align: center;
            color: #8888AA;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .error-msg {
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.3);
            color: #FF6B6B;
            padding: 10px 16px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 16px;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            color: #8888AA;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #2A2955;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #E0E0E0;
            font-size: 15px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #6C5CE7;
            box-shadow: 0 0 0 3px rgba(108,92,231,0.1);
        }
        .form-group input::placeholder { color: #555; }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6C5CE7, #5A4BD1);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108,92,231,0.4);
        }
        .login-footer {
            text-align: center;
            margin-top: 20px;
        }
        .login-footer a {
            color: #6C5CE7;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .login-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">🔐</div>
        <div class="login-title">تسجيل الدخول</div>
        <div class="login-sub">لوحة تحكم المتجر</div>
        
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="error-msg">❌ {{ messages[0] }}</div>
        {% endif %}
        {% endwith %}
        
        <form method="post">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" name="username" placeholder="أدخل اسم المستخدم" required>
            </div>
            <div class="form-group">
                <label>كلمة السر</label>
                <input type="password" name="password" placeholder="أدخل كلمة السر" required>
            </div>
            <button type="submit" class="login-btn">🚪 دخول</button>
        </form>
        
        <div class="login-footer">
            <a href="/">← العودة للمتجر</a>
        </div>
    </div>
</body>
</html>
